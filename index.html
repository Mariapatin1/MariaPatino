    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23007AFF'/><stop offset='100%25' stop-color='%23AF52DE'/></linearGradient></defs><text y='.9em' font-size='90' font-family='serif' fill='url(%23g)'>M</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #FFFFFF;
            --bg: #FAFAFA;
            --bg-2: #F2F2F7;
            --bg-3: #E5E5EA;
            --gray-1: #D1D1D6;
            --gray-2: #AEAEB2;
            --gray-3: #8E8E93;
            --gray-4: #636366;
            --gray-5: #48484A;
            --dark: #1D1D1F;
            --dark-2: #2C2C2E;

            /* Apple vibrant palette */
            --blue: #007AFF;
            --indigo: #5856D6;
            --purple: #AF52DE;
            --pink: #FF2D55;
            --red: #FF3B30;
            --orange: #FF9500;
            --yellow: #FFCC00;
            --green: #34C759;
            --teal: #5AC8FA;
            --mint: #00C7BE;

            /* Gradients */
            --grad-hero: linear-gradient(135deg, #007AFF 0%, #5856D6 35%, #AF52DE 65%, #FF2D55 100%);
            --grad-accent: linear-gradient(135deg, #007AFF 0%, #5856D6 50%, #AF52DE 100%);
            --grad-warm: linear-gradient(135deg, #FF9500 0%, #FF2D55 50%, #AF52DE 100%);
            --grad-cool: linear-gradient(135deg, #5AC8FA 0%, #007AFF 50%, #5856D6 100%);
            --grad-subtle: linear-gradient(135deg, rgba(0,122,255,0.06) 0%, rgba(175,82,222,0.06) 50%, rgba(255,45,85,0.06) 100%);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 80px;
        }

        html { background: var(--white); }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: transparent;
            color: var(--dark);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        ::selection {
            background: var(--blue);
            color: white;
        }

        a { color: inherit; text-decoration: none; }

        /* Gradient text utility */
        .gradient-text {
            background: var(--grad-hero);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ============================================
           CURSOR GLOW
           ============================================ */
        .cursor-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(88, 86, 214, 0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: opacity 0.4s;
            opacity: 0;
        }

        body:hover .cursor-glow { opacity: 1; }

        /* ============================================
           NAV
           ============================================ */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            transition: all 0.3s;
        }

        nav .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 72px;
        }

        nav.scrolled {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .nav-name {
            font-family: 'Instrument Serif', serif;
            font-size: 1.3rem;
            color: var(--dark);
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--gray-4);
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--dark); }

        .nav-links a.active { color: var(--blue); }

        .nav-resume-btn {
            padding: 0.5rem 1.2rem;
            background: var(--dark);
            color: var(--white) !important;
            border-radius: 100px;
            font-size: 0.78rem !important;
            font-weight: 600 !important;
            transition: all 0.3s !important;
        }

        .nav-resume-btn:hover {
            background: var(--blue) !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            width: 22px;
            height: 1.5px;
            background: var(--dark);
            margin: 5px 0;
            transition: all 0.3s;
        }

        /* ============================================
           HERO
           ============================================ */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 8rem 3rem 4rem;
            position: relative;
            overflow: hidden;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.85);
        }

        .hero-inner {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .hero-name-row {
            position: relative;
            z-index: 1;
            margin-bottom: 2.5rem;
        }

        .hero-columns {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-visual {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(30px) scale(0.97);
            animation: staggerIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        }

        @keyframes staggerIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .hero-memoji {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            overflow: hidden;
            background: var(--bg-2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 3px solid var(--bg-3);
            position: relative;
        }

        .hero-memoji img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-memoji::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: var(--grad-hero);
            z-index: -1;
            opacity: 0.4;
            filter: blur(15px);
        }

        /* Decorative gradient blobs */
        .hero-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            opacity: 0.5;
        }

        .hero-blob-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 122, 255, 0.15) 0%, transparent 70%);
            top: 5%; right: 10%;
            animation: drift 10s ease-in-out infinite;
        }

        .hero-blob-2 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(175, 82, 222, 0.12) 0%, transparent 70%);
            bottom: 10%; left: 5%;
            animation: drift 12s ease-in-out infinite reverse;
        }

        .hero-blob-3 {
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(255, 45, 85, 0.08) 0%, transparent 70%);
            top: 40%; left: 40%;
            animation: drift 8s ease-in-out infinite 2s;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -15px); }
        }

        /* Interactive wave canvas */
        #wave-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .hero-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--blue);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }

        .hero-label::before {
            content: '';
            width: 40px; height: 2px;
            background: var(--grad-accent);
            border-radius: 1px;
        }

        .hero-name {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(3.5rem, 10vw, 8rem);
            font-weight: 400;
            line-height: 1;
            letter-spacing: -0.02em;
            color: var(--dark);
            margin-bottom: 0.3em;
            position: relative;
            z-index: 1;
        }

        .hero-name .gradient-text {
            padding-right: 0.05em;
        }

        .hero-name .line {
            display: block;
            overflow: visible;
            padding-bottom: 0.05em;
        }

        .hero-name .line-inner {
            display: block;
            transform: translateY(105%);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .hero-name .line:nth-child(2) .line-inner {
            animation-delay: 0.12s;
        }

        .hero-name .italic {
            font-style: italic;
        }

        @keyframes slideUp {
            to { transform: translateY(0); }
        }

        .hero-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--bg-3);
            position: relative;
            z-index: 1;
        }

        .hero-desc {
            max-width: 500px;
            font-size: 1.15rem;
            line-height: 1.75;
            color: var(--dark);
            font-weight: 500;
        }

        .hero-certs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .hero-cert {
            padding: 0.25rem 0.65rem;
            border: 1px solid var(--bg-3);
            border-radius: 100px;
            font-size: 0.68rem;
            color: var(--gray-4);
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .hero-ctas {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-shrink: 0;
        }

        .btn-main {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2rem;
            background: var(--blue);
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-main:hover {
            background: #0066DD;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 122, 255, 0.3);
        }

        .btn-gradient {
            background: var(--grad-accent);
        }

        .btn-gradient:hover {
            box-shadow: 0 8px 30px rgba(88, 86, 214, 0.35);
        }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 1.75rem;
            background: transparent;
            color: var(--gray-4);
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 100px;
            border: 1.5px solid var(--gray-1);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-outline:hover {
            border-color: var(--blue);
            color: var(--blue);
            transform: translateY(-2px);
        }

        .hero-scroll {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-2);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            z-index: 1;
        }

        .hero-scroll-line {
            width: 1px; height: 50px;
            background: linear-gradient(to bottom, var(--gray-2), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ============================================
           MARQUEE
           ============================================ */
        .marquee-section {
            padding: 1.1rem 0;
            overflow: hidden;
            background: var(--dark);
        }

        .marquee-track {
            display: flex;
            width: max-content;
            animation: marquee 30s linear infinite;
        }

        .marquee-track:hover { animation-play-state: paused; }

        .marquee-item {
            display: flex;
            align-items: center;
            gap: 2rem;
            padding: 0 2rem;
            white-space: nowrap;
        }

        .marquee-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.5);
        }

        .marquee-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--blue);
        }

        @keyframes marquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* ============================================
           SECTIONS
           ============================================ */
        section { padding: 8rem 3rem; }

        .section-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--blue);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-label::before {
            content: '';
            width: 20px; height: 2px;
            background: var(--grad-accent);
            border-radius: 1px;
        }

        .section-heading {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -0.03em;
            color: var(--dark);
            margin-bottom: 3.5rem;
            max-width: 700px;
        }

        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.visible { opacity: 1; transform: translateY(0); }

        /* ============================================
           BENTO - ABOUT
           ============================================ */
        .about { background: rgba(255, 255, 255, 0.85); }

        .bento {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            max-width: 1200px;
        }

        .bento-card {
            background: var(--bg);
            border: 1px solid var(--bg-3);
            border-radius: 20px;
            padding: 2.25rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .bento-card:hover {
            border-color: var(--gray-1);
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.06);
        }

        .bento-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--grad-hero);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .bento-card:hover::before { opacity: 1; }

        .bento-wide { grid-column: span 2; }

        .bento-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--gray-3);
            margin-bottom: 1.25rem;
        }

        .bento-text {
            font-size: 0.95rem;
            line-height: 1.85;
            color: var(--gray-4);
            font-weight: 400;
        }

        .bento-text strong {
            color: var(--dark);
            font-weight: 600;
        }

        .bento-stat {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .bento-stat-number {
            font-family: 'Instrument Serif', serif;
            font-size: 4rem;
            line-height: 1;
            letter-spacing: -0.03em;
            background: var(--grad-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bento-stat-label {
            font-size: 0.82rem;
            color: var(--gray-3);
            font-weight: 400;
            margin-top: 0.5rem;
        }

        .bento-value {
            font-family: 'Instrument Serif', serif;
            font-size: 2.2rem;
            color: var(--dark);
            line-height: 1.15;
            letter-spacing: -0.02em;
        }

        .bento-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 1rem;
        }

        .bento-skill {
            padding: 0.35rem 0.85rem;
            border: 1px solid var(--bg-3);
            border-radius: 100px;
            font-size: 0.72rem;
            color: var(--gray-4);
            font-weight: 500;
            transition: all 0.3s;
            cursor: default;
        }

        .bento-skill:hover {
            border-color: var(--blue);
            color: var(--blue);
            background: rgba(0, 122, 255, 0.05);
        }

        /* ============================================
           EXPERIENCE
           ============================================ */
        .experience {
            background: var(--bg);
        }

        .exp-grid { max-width: 1200px; }

        .exp-item {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 3rem;
            padding: 3rem 0;
            border-bottom: 1px solid var(--bg-3);
            transition: all 0.3s;
            position: relative;
        }

        .exp-item:first-child { border-top: 1px solid var(--bg-3); }

        .exp-item:hover { padding-left: 1.5rem; }

        .exp-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--grad-accent);
            border-radius: 2px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .exp-item:hover::before { opacity: 1; }

        .exp-date {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--gray-3);
            letter-spacing: 0.08em;
            padding-top: 0.5rem;
        }

        .exp-role {
            font-family: 'Instrument Serif', serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--dark);
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .exp-company {
            font-size: 0.85rem;
            color: var(--gray-3);
            margin-bottom: 1.25rem;
        }

        .exp-bullets {
            list-style: none;
            display: grid;
            gap: 0.5rem;
        }

        .exp-bullets li {
            font-size: 0.88rem;
            color: var(--gray-4);
            line-height: 1.65;
            font-weight: 400;
            padding-left: 1.2rem;
            position: relative;
        }

        .exp-bullets li::before {
            content: '';
            position: absolute;
            left: 0; top: 0.6em;
            width: 5px; height: 5px;
            background: var(--blue);
            border-radius: 50%;
        }

        .exp-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 1.25rem;
            padding: 0.35rem 1rem;
            background: rgba(0, 122, 255, 0.06);
            border: 1px solid rgba(0, 122, 255, 0.15);
            border-radius: 100px;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--blue);
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        /* ============================================
           GRADIENT CTA BAND
           ============================================ */

        /* ============================================
           TESTIMONIALS
           ============================================ */
        .testimonials {
            background: var(--bg);
        }

        .testimonial-grid {
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .testimonial-card {
            background: var(--white);
            border: 1px solid var(--bg-3);
            border-radius: 20px;
            padding: 2.5rem;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .testimonial-card:hover {
            border-color: var(--gray-1);
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.06);
        }

        .testimonial-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--grad-accent);
            opacity: 0;
            transition: opacity 0.4s;
            border-radius: 20px 20px 0 0;
        }

        .testimonial-card:hover::before { opacity: 1; }

        .testimonial-quote-mark {
            font-family: 'Instrument Serif', serif;
            font-size: 4rem;
            line-height: 1;
            background: var(--grad-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .testimonial-text {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--gray-4);
            font-weight: 400;
            font-style: italic;
            margin-bottom: 1.75rem;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--bg-3);
        }

        .testimonial-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--grad-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .testimonial-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--dark);
        }

        .testimonial-role {
            font-size: 0.72rem;
            color: var(--gray-3);
        }

        @media (max-width: 700px) {
            .testimonial-grid { grid-template-columns: 1fr; }

        /* ============================================
           GRADIENT CTA BAND (continued)
           ============================================ */
        .cta-band {
            background: #2d1b69;
            padding: 5rem 3rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .cta-band::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 50%, rgba(175, 82, 222, 0.15) 0%, transparent 70%);
        }

        .cta-band-text {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            color: white;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .cta-band .btn-white {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2rem;
            background: white;
            color: var(--dark);
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            text-decoration: none;
            position: relative;
            z-index: 1;
        }

        .cta-band .btn-white:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        /* ============================================
           PROJECT
           ============================================ */
        .project-section { background: rgba(255, 255, 255, 0.85); }

        .project-card {
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--bg);
            border: 1px solid var(--bg-3);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s;
        }

        .project-card:hover {
            border-color: var(--gray-1);
            box-shadow: 0 30px 80px rgba(0,0,0,0.08);
            transform: translateY(-4px);
        }

        .project-info {
            padding: 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .project-eyebrow {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--indigo);
            margin-bottom: 1.25rem;
        }

        .project-name {
            font-family: 'Instrument Serif', serif;
            font-size: 3rem;
            font-weight: 400;
            color: var(--dark);
            letter-spacing: -0.03em;
            margin-bottom: 0.2rem;
        }

        .project-tagline {
            font-size: 0.95rem;
            color: var(--indigo);
            margin-bottom: 1.75rem;
            font-weight: 500;
        }

        .project-desc {
            font-size: 0.92rem;
            color: var(--gray-4);
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .project-feats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .project-feat {
            font-size: 0.78rem;
            color: var(--gray-4);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .project-feat::before {
            content: '';
            width: 5px; height: 5px;
            background: var(--indigo);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .project-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 2.5rem;
        }

        .project-stack span {
            font-family: 'Space Mono', monospace;
            padding: 0.3rem 0.75rem;
            border: 1px solid var(--bg-3);
            border-radius: 100px;
            font-size: 0.65rem;
            color: var(--gray-4);
        }

        .project-visual {
            background: linear-gradient(135deg, var(--bg-2) 0%, var(--bg-3) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            position: relative;
            overflow: hidden;
            padding: 2rem;
            gap: 1.25rem;
        }

        .project-visual::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 70% 50%, rgba(88, 86, 214, 0.08) 0%, transparent 60%);
        }

        .project-visual-main {
            max-width: 90%;
            max-height: 340px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1;
            object-fit: contain;
            transition: opacity 0.3s ease;
        }

        .project-thumbs {
            display: flex;
            gap: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .project-thumb {
            width: 56px;
            height: 38px;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0.5;
        }

        .project-thumb.active {
            border-color: var(--blue);
            opacity: 1;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.25);
        }

        .project-thumb:hover {
            opacity: 0.85;
        }

        .project-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Lightbox Modal */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
            padding: 2rem;
        }

        .lightbox.open {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 75vh;
            border-radius: 16px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            object-fit: contain;
        }

        .lightbox-caption {
            font-family: 'Space Mono', monospace;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .lightbox-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .lightbox-nav:hover {
            background: rgba(255,255,255,0.2);
        }

        .lightbox-prev { left: 1.5rem; }
        .lightbox-next { right: 1.5rem; }

        .lightbox-counter {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.1em;
        }

        .pv-placeholder {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .pv-placeholder .pv-icon {
            font-size: 3.5rem;
            opacity: 0.2;
            margin-bottom: 0.5rem;
        }

        .pv-placeholder p {
            font-size: 0.75rem;
            color: var(--gray-3);
        }

        /* ============================================
           CONTACT
           ============================================ */
        .contact {
            background: var(--dark);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .contact::before {
            content: '';
            position: absolute;
            bottom: -200px; right: -200px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 122, 255, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .contact::after {
            content: '';
            position: absolute;
            top: -150px; left: -150px;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(175, 82, 222, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .contact .section-label { color: var(--teal); }
        .contact .section-label::before { background: var(--grad-cool); }
        .contact .section-heading { color: white; }

        .contact-layout {
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            position: relative;
            z-index: 1;
        }

        .contact-left h3 {
            font-family: 'Instrument Serif', serif;
            font-size: 2.5rem;
            font-weight: 400;
            color: white;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            line-height: 1.15;
        }

        .contact-left p {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.5);
            line-height: 1.8;
            margin-bottom: 3rem;
            max-width: 400px;
        }

        .contact-methods {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .contact-method {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.1rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            color: rgba(255,255,255,0.6);
            font-size: 0.88rem;
            transition: all 0.3s;
        }

        .contact-method:hover {
            border-color: rgba(0, 122, 255, 0.4);
            color: white;
            background: rgba(0, 122, 255, 0.08);
            transform: translateX(6px);
        }

        .contact-method-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .contact-right {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-card {
            background: var(--dark-2);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            width: 100%;
            max-width: 380px;
        }

        .contact-card-avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 2px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .contact-card-avatar img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .contact-card h4 {
            font-family: 'Instrument Serif', serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: white;
            margin-bottom: 0.15rem;
        }

        .contact-card .card-role {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 1rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.35rem 0.85rem;
            background: rgba(52, 199, 89, 0.1);
            border: 1px solid rgba(52, 199, 89, 0.25);
            border-radius: 100px;
            font-size: 0.68rem;
            color: var(--green);
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .contact-card .btn-main {
            width: 100%;
            justify-content: center;
            background: var(--grad-accent);
        }

        .contact-card .btn-main:hover {
            box-shadow: 0 8px 30px rgba(88, 86, 214, 0.35);
        }

        .contact-card .btn-outline-dark {
            width: 100%;
            justify-content: center;
            border-color: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.6);
        }

        .contact-card .btn-outline-dark:hover {
            border-color: var(--blue);
            color: var(--blue);
            background: rgba(0, 122, 255, 0.08);
        }

        /* ============================================
           FOOTER
           ============================================ */
        footer {
            padding: 2rem 3rem;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--dark);

        footer p {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.25);

        .footer-links {
            display: flex;
            gap: 1.5rem;
        }

        .footer-links a {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.25);
            transition: color 0.3s;
        }

        .footer-links a:hover { color: var(--blue); }

        /* ============================================
           MOBILE
           ============================================ */
        .mobile-menu {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .mobile-menu.open {
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .mobile-menu a {
            font-family: 'Instrument Serif', serif;
            font-size: 2.5rem;
            color: var(--dark);
            transition: color 0.3s;
        }

        .mobile-menu a:hover { color: var(--blue); }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 960px) {
            section { padding: 5rem 2rem; }
            nav .nav-inner { padding: 0 2rem; }
            .hero { padding: 7rem 2rem 4rem; }
            .hero-inner { text-align: center; }
            .hero-columns {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .hero-visual { order: -1; }
            .hero-memoji { width: 240px; height: 240px; margin: 0 auto; }
            .hero-label { justify-content: center; }
            .hero-certs { justify-content: center; }
            .hero-desc { margin: 0 auto; }
            .hero-ctas { justify-content: center; }

            .hero-bottom {
                flex-direction: column;
                align-items: flex-start;
                gap: 2rem;
            }

            .bento { grid-template-columns: 1fr 1fr; }
            .bento-wide { grid-column: span 2; }

            .exp-item {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }

            .project-card { grid-template-columns: 1fr; }
            .project-visual { min-height: 300px; }
            .contact-layout { grid-template-columns: 1fr; gap: 3rem; }

            footer {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }

        @media (max-width: 700px) {
            .nav-links { display: none; }
            .hamburger { display: block; }

            .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
            .hamburger.open span:nth-child(2) { opacity: 0; }
            .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

            .bento { grid-template-columns: 1fr; }
            .bento-wide { grid-column: span 1; }
            .project-feats { grid-template-columns: 1fr; }
            .project-info { padding: 2rem; }
            .cta-band { padding: 3rem 2rem; }
        }

        @media (max-width: 480px) {
            .hero { padding: 6rem 1.25rem 3rem; }
            section { padding: 4rem 1.25rem; }
            nav .nav-inner { padding: 0 1.25rem; }

            .hero-ctas { flex-direction: column; width: 100%; }
            .hero-ctas a { width: 100%; justify-content: center; }
            .hero-scroll { display: none; }
        }
    </style>
</head>

            var id = s.getAttribute('id');

            projectMainImg.style.opacity = '1';
        }, 150);
        document.querySelectorAll('.project-thumb').forEach(function(t) { t.classList.remove('active'); });
        if (thumbEl) thumbEl.classList.add('active');
        lbIndex = i;
    }

    function openLightbox(i) {
        lbImages = miniMeImages;
        lbIndex = i;
        updateLightbox();
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
    }

    function navLightbox(dir) {
        lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
        updateLightbox();
    }

    function updateLightbox() {
        lbImg.src = lbImages[lbIndex].src;
        lbImg.alt = lbImages[lbIndex].label;
        lbCaption.textContent = lbImages[lbIndex].label;
        lbCounter.textContent = (lbIndex + 1) + ' / ' + lbImages.length;
    }

    // Close on backdrop click
    lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) closeLightbox();
    });

    // Keyboard nav
    document.addEventListener('keydown', function(e) {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') navLightbox(-1);
        if (e.key === 'ArrowRight') navLightbox(1);
    });

    // Interactive wave background
    (function() {
        var canvas = document.getElementById('wave-canvas');
        var ctx = canvas.getContext('2d');
        var hero = document.getElementById('hero');
        var mouseX = 0, mouseY = 0;
        var scrollY = 0;
        var isVisible = true;
        var animationId = null;

        function resize() {
            canvas.width = hero.offsetWidth;
            canvas.height = hero.offsetHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('scroll', function() {
            scrollY = window.pageYOffset;
            var shouldBeVisible = scrollY < window.innerHeight * 1.5;
            if (shouldBeVisible !== isVisible) {
                isVisible = shouldBeVisible;
                if (isVisible && !animationId) draw();
            }
        });

        var waves = [
            { color: 'rgba(0, 122, 255, 0.28)', amplitude: 60, frequency: 0.003, speed: 0.02, yOffset: 0.20 },
            { color: 'rgba(88, 86, 214, 0.22)', amplitude: 50, frequency: 0.004, speed: 0.015, yOffset: 0.30 },
            { color: 'rgba(175, 82, 222, 0.18)', amplitude: 45, frequency: 0.005, speed: 0.025, yOffset: 0.40 },
            { color: 'rgba(255, 45, 85, 0.14)', amplitude: 55, frequency: 0.0035, speed: 0.018, yOffset: 0.50 },
        ];

        var time = 0;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            var mouseInfluence = (mouseX / canvas.width - 0.5) * 30;
            var scrollOffset = scrollY * 0.15;

            for (var w = 0; w < waves.length; w++) {
                var wave = waves[w];
                ctx.beginPath();
                var baseY = canvas.height * wave.yOffset - scrollOffset * (0.5 + w * 0.15);

                ctx.moveTo(0, canvas.height);
                ctx.lineTo(0, baseY);

                for (var x = 0; x <= canvas.width; x += 3) {
                    var distFromMouse = Math.abs(x - mouseX);
                    var mouseBump = Math.max(0, 1 - distFromMouse / 300) * 25 * Math.sin(time * 3 + x * 0.01);
                    var y = baseY + Math.sin(x * wave.frequency + time * wave.speed * 60) * wave.amplitude
                        + Math.sin(x * wave.frequency * 1.5 + time * wave.speed * 40) * wave.amplitude * 0.5
                        + mouseInfluence * Math.sin(x * 0.005 + time * 0.03 * 60)
                        + mouseBump;
                    ctx.lineTo(x, y);
                }

                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                ctx.fillStyle = wave.color;
                ctx.fill();
            }

            time += 0.016;
            if (isVisible) {
                animationId = requestAnimationFrame(draw);
            } else {
                animationId = null;
            }
        }

        draw();
    })();
</script>
</body>
</html>
